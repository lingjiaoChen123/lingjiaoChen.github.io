<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫咪档案 | 校园流浪猫守护站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f7f8fa;color:#333;}
        /* 导航 */
        .nav{background:#222;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99;}
        .nav a{color:#fff;text-decoration:none;margin:0 15px;}
        .nav a:hover,.nav a.active{color:#ffb700;}
        /* 容器 */
        .container{max-width:1200px;margin:40px auto;padding:0 20px;}
        .title{text-align:center;font-size:30px;margin:50px 0 30px;color:#222;}
        /* 猫咪卡片 */
        .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px;}
        .cat-card{background:#fff;border-radius:12px;box-shadow:0 3px 15px #eee;overflow:hidden;}
        .cat-card img{width:100%;height:200px;object-fit:cover;}
        .cat-info{padding:18px;}
        .cat-info h3{font-size:20px;}
        .tag{display:inline-block;padding:4px 12px;background:#e1f5fe;color:#0288d1;border-radius:20px;font-size:12px;margin-top:10px;}
        footer{text-align:center;padding:30px;background:#222;color:#fff;margin-top:60px;}
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="nav">
        <h2>校园流浪猫守护站</h2>
        <div>
            <a href="index.html">首页</a>
            <a href="cats.html" class="active">猫咪档案</a>
            <a href="about.html">参与方式</a>
        </div>
    </div>

    <div class="container">
        <h2 class="title">校园常驻猫咪档案</h2>
        <div class="cat-grid">
            <div class="cat-card">
                <img src="https://picsum.photos/id/1074/400/250" alt="橘猫大橘">
                <div class="cat-info">
                    <h3>大橘</h3>
                    <p>性格温顺亲人，常在操场晒太阳，喜欢蹭同学的腿</p>
                    <span class="tag">亲人猫 · 已绝育</span>
                </div>
            </div>
            <div class="cat-card">
                <img src="https://picsum.photos/id/40/400/250" alt="狸花猫">
                <div class="cat-info">
                    <h3>狸花</h3>
                    <p>警惕性高，常在图书馆附近活动，只吃固定投喂点的猫粮</p>
                    <span class="tag">警惕猫 · 未绝育</span>
                </div>
            </div>
            <div class="cat-card">
                <img src="https://picsum.photos/id/169/400/250" alt="三花猫">
                <div class="cat-info">
                    <h3>三花</h3>
                    <p>胆子很小，但熟悉后会主动蹭人，喜欢躲在教学楼角落</p>
                    <span class="tag">胆小猫 · 已绝育</span>
                </div>
            </div>
            <div class="cat-card">
                <img src="https://picsum.photos/id/237/400/250" alt="小黑">
                <div class="cat-info">
                    <h3>小黑</h3>
                    <p>高冷帅气，夜间出没，不常靠近人，需要慢慢熟悉</p>
                    <span class="tag">高冷猫 · 已绝育</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        校园流浪猫守护平台 · 用心守护每一只小生命
    </footer>
</body>
</html>
