<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫咪档案库</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f6f7f9;}
        .nav{background:#232730;padding:16px 0;}
        .nav-box{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:45px;}
        .nav a{color:#fff;text-decoration:none;font-size:17px;}
        .nav a.active{color:#ff9500;}
        .container{max-width:1200px;margin:40px auto;padding:0 20px;}
        h2{text-align:center;font-size:28px;margin-bottom:40px;}
        .cat-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px;}
        .cat-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 3px 12px #eee;padding-bottom:20px;}
        .cat-card img{width:100%;height:210px;object-fit:cover;}
        .cat-info{padding:18px;}
        .tag{display:inline-block;padding:4px 10px;border-radius:15px;font-size:13px;margin:5px 5px 5px 0;}
        .yes{background:#e6f7ff;color:#1890ff;}
        .no{background:#fff2e8;color:#fa8c16;}
        .btn{padding:7px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
        .feed-btn{background:#95de64;color:#fff;}
        .adopt-btn{background:#ff7875;color:#fff;}
        /* 弹窗表单 */
        .mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:999;}
        .form-box{width:500px;background:#fff;padding:30px;border-radius:12px;}
        .form-box input,.form-box textarea{width:100%;margin:10px 0;padding:10px;border:1px solid #ccc;border-radius:6px;}
        .close{text-align:right;cursor:pointer;color:#999;}
        footer{background:#232730;color:#fff;text-align:center;padding:35px 0;margin-top:60px;}
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-box">
            <a href="index.html">首页</a>
            <a href="archive.html" class="active">猫咪档案库</a>
            <a href="interaction.html">创意互动区</a>
            <a href="ai.html">智能助手区</a>
            <a href="login.html">退出登录</a>
        </div>
    </div>

    <div class="container">
        <h2>校园流浪猫专属档案</h2>
        <div class="cat-list" id="catList"></div>
    </div>

    <!-- 反馈弹窗 -->
    <div class="mask" id="feedMask">
        <div class="form-box">
            <div class="close" onclick="closeFeed()">关闭×</div>
            <h3>提交猫咪相关反馈</h3>
            <textarea id="feedText" rows="5" placeholder="填写你发现的猫咪状态、位置、健康情况等"></textarea>
            <button class="btn feed-btn" onclick="submitFeed()">提交反馈</button>
        </div>
    </div>

    <!-- 领养申请表单弹窗 -->
    <div class="mask" id="adoptMask">
        <div class="form-box">
            <div class="close" onclick="closeAdopt()">关闭×</div>
            <h3>流浪猫领养申请表</h3>
            <input type="text" id="adoptName" placeholder="申请人姓名">
            <input type="text" id="adoptTel" placeholder="联系电话">
            <input type="text" id="wantCat" placeholder="想要领养的猫咪名字">
            <textarea id="adoptReason" rows="4" placeholder="填写领养理由、居住环境、饲养条件"></textarea>
            <button class="btn adopt-btn" onclick="submitAdopt()">提交领养申请</button>
        </div>
    </div>

    <footer>
        <p>爱心守护团队联系电话：13800138000</p>
        <p>官方反馈邮箱：catlove@school.com</p>
    </footer>

<script>
// 猫咪数据
let catData=[
    {id:1,name:"大橘",sterile:true,nature:"温顺亲人",hobby:"晒太阳、蹭人",img:"https://picsum.photos/id/1074/400/220"},
    {id:2,name:"狸花猫",sterile:false,nature:"机敏警惕",hobby:"夜间跑动、捕猎",img:"https://picsum.photos/id/40/400/220"},
    {id:3,name:"三花",sterile:true,nature:"胆小温柔",hobby:"躲角落休息",img:"https://picsum.photos/id/169/400/220"},
    {id:4,name:"小黑",sterile:true,nature:"高冷独立",hobby:"深夜外出活动",img:"https://picsum.photos/id/237/400/220"}
];

// 渲染档案
function renderCat(){
    let html="";
    catData.forEach(item=>{
        html+=`
        <div class="cat-card">
            <img src="${item.img}">
            <div class="cat-info">
                <h3>${item.name}</h3>
                <span class="tag ${item.sterile?'yes':'no'}">${item.sterile?'已绝育':'未绝育'}</span>
                <p>性格：${item.nature}</p>
                <p>爱好：${item.hobby}</p>
                <button class="btn feed-btn" onclick="openFeed(${item.id})">提交反馈</button>
                <button class="btn adopt-btn" onclick="openAdopt(${item.name})">立即领养</button>
            </div>
        </div>
        `
    })
    document.getElementById("catList").innerHTML=html;
}

// 反馈
function openFeed(){document.getElementById("feedMask").style.display="flex";}
function closeFeed(){document.getElementById("feedMask").style.display="none";}
function submitFeed(){
    let text=document.getElementById("feedText").value;
    if(!text){alert("请填写反馈内容");return;}
    let feedList=JSON.parse(localStorage.getItem("catFeed"))||[];
    feedList.push({user:localStorage.getItem("nowUser"),content:text,time:new Date().toLocaleString()});
    localStorage.setItem("catFeed",JSON.stringify(feedList));
    alert("反馈提交成功，管理员可查看！");
    closeFeed();
    document.getElementById("feedText").value="";
}

// 领养
function openAdopt(name){
    document.getElementById("wantCat").value=name;
    document.getElementById("adoptMask").style.display="flex";
}
function closeAdopt(){document.getElementById("adoptMask").style.display="none";}
function submitAdopt(){
    let name=document.getElementById("adoptName").value;
    let tel=document.getElementById("adoptTel").value;
    let cat=document.getElementById("wantCat").value;
    let reason=document.getElementById("adoptReason").value;
    if(!name||!tel||!reason){alert("信息填写完整");return;}
    let adoptList=JSON.parse(localStorage.getItem("catAdopt"))||[];
    adoptList.push({name,tel,cat,reason,user:localStorage.getItem("nowUser"),time:new Date().toLocaleString()});
    localStorage.setItem("catAdopt",JSON.stringify(adoptList));
    alert("领养申请提交成功，等待管理员审核！");
    closeAdopt();
}

renderCat();
</script>
</body>
</html>
