<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园流浪猫守护站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f7f8fa;color:#333;}
        /* 顶部导航 */
        .nav{background:#222;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99;}
        .nav a{color:#fff;text-decoration:none;margin:0 15px;font-size:16px;}
        .nav a.active,.nav a:hover{color:#ffc107;}

        /* 图片轮播容器 */
        .swiper{width:100%;height:460px;overflow:hidden;position:relative;}
        .img-box{width:300%;height:100%;display:flex;transition:0.6s ease;}
        .img-box img{width:100%;height:100%;object-fit:cover;}
        /* 轮播文字 */
        .swiper-text{position:absolute;left:0;bottom:80px;width:100%;text-align:center;color:#fff;}
        .swiper-text h1{font-size:40px;text-shadow:2px 2px 6px #000;}
        .swiper-text p{font-size:20px;margin-top:10px;}
        /* 小圆点 */
        .dot{position:absolute;bottom:30px;width:100%;text-align:center;}
        .dot span{display:inline-block;width:12px;height:12px;border-radius:50%;background:#ccc;margin:0 6px;cursor:pointer;}
        .dot span.active{background:#ffc107;}

        .container{max-width:1200px;margin:40px auto;padding:0 20px;}
        .title{text-align:center;font-size:30px;margin:50px 0 30px;color:#222;}

        /* 猫咪投票卡片 */
        .cat-box{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px;}
        .cat-card{background:#fff;border-radius:12px;box-shadow:0 3px 15px #eee;overflow:hidden;}
        .cat-card img{width:100%;height:200px;object-fit:cover;}
        .cat-info{padding:18px;}
        .cat-info h3{font-size:20px;}
        .vote-num{color:#e63946;margin:8px 0;}
        .vote-btn{background:#ff6b6b;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;}
        .vote-btn:hover{background:#ee5253;}

        /* 排名 */
        .rank-box{background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 10px #eee;margin:40px 0;}
        .rank-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee;}

        /* 上传图片 */
        .upload-area{background:#fff;padding:30px;border-radius:12px;text-align:center;margin:40px 0;}
        #file-input{display:none;}
        .upload-btn{background:#409eff;color:#fff;padding:10px 25px;border-radius:6px;cursor:pointer;display:inline-block;}
        .preview-img{max-width:300px;margin-top:20px;border-radius:8px;}

        /* 智能问答 */
        .ai-box{background:#fff;padding:30px;border-radius:12px;margin:40px 0;}
        .chat-box{height:300px;border:1px solid #ddd;padding:15px;overflow-y:auto;margin-bottom:15px;}
        .user-msg{text-align:right;margin:8px 0;}
        .ai-msg{text-align:left;margin:8px 0;color:#2c3e50;}
        .chat-input{width:80%;padding:10px;border:1px solid #ccc;border-radius:6px;}
        .send-btn{padding:10px 20px;background:#27ae60;color:#fff;border:none;border-radius:6px;cursor:pointer;}

        footer{text-align:center;padding:30px;background:#222;color:#fff;margin-top:60px;}
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="nav">
        <h2>校园流浪猫守护站</h2>
        <div>
            <a href="index.html" class="active">首页</a>
            <a href="cats.html">猫咪档案</a>
            <a href="about.html">参与方式</a>
        </div>
    </div>

    <!-- 顶部图片自动轮播 -->
    <div class="swiper">
        <div class="img-box" id="imgBox">
            <img src="https://picsum.photos/id/40/1920/800" alt="">
            <img src="https://picsum.photos/id/1074/1920/800" alt="">
            <img src="https://picsum.photos/id/169/1920/800" alt="">
        </div>
        <!-- 轮播文字 -->
        <div class="swiper-text">
            <h1 id="mainTitle">关爱校园流浪猫</h1>
            <p id="subTitle">用心呵护小猫咪</p>
        </div>
        <!-- 圆点指示器 -->
        <div class="dot">
            <span class="active" onclick="changeIndex(0)"></span>
            <span onclick="changeIndex(1)"></span>
            <span onclick="changeIndex(2)"></span>
        </div>
    </div>

    <div class="container">
        <!-- 猫咪投票 -->
        <h2 class="title">可爱猫咪投票专区</h2>
        <div class="cat-box" id="catContainer"></div>

        <!-- 喜爱度排名 -->
        <h2 class="title">猫咪喜爱度实时排名</h2>
        <div class="rank-box" id="rankBox"></div>

        <!-- 图片上传 -->
        <h2 class="title">上传校园猫咪实拍</h2>
        <div class="upload-area">
            <label class="upload-btn" for="file-input">选择图片上传</label>
            <input type="file" id="file-input" accept="image/*">
            <div><img class="preview-img" id="imgPreview" style="display:none;"></div>
            <p style="margin-top:15px;color:#666;">分享你拍到的校园猫咪</p>
        </div>

        <!-- 智能问答 -->
        <h2 class="title">猫咪智能互动问答</h2>
        <div class="ai-box">
            <div class="chat-box" id="chatBox">
                <div class="ai-msg">AI守护助手：你好，有任何猫咪相关问题都可以问我！</div>
            </div>
            <input class="chat-input" id="chatInput" placeholder="输入问题：怎么喂流浪猫">
            <button class="send-btn" onclick="sendChat()">发送</button>
        </div>
    </div>

    <footer>校园流浪猫守护平台 · 爱心守护生灵</footer>

<script>
    // ========== 顶部图片轮播+文字切换 ==========
    const imgBox = document.getElementById("imgBox");
    const dots = document.querySelectorAll(".dot span");
    const titleList = [
        {t:"关爱校园流浪猫",s:"用心呵护小猫咪"},
        {t:"守护身边小生命",s:"善待每一只流浪猫"},
        {t:"同心守护毛孩子",s:"小爱温暖校园"}
    ];
    let index = 0;
    let timer;

    function autoPlay(){
        index++;
        if(index >= 3) index = 0;
        moveSwiper();
    }
    function moveSwiper(){
        imgBox.style.transform = `translateX(-${index*100}%)`;
        //切换圆点
        dots.forEach((item,i)=>{
            item.classList.toggle("active",i===index);
        })
        //切换文字
        document.getElementById("mainTitle").innerText = titleList[index].t;
        document.getElementById("subTitle").innerText = titleList[index].s;
    }
    function changeIndex(i){
        index = i;
        moveSwiper();
    }
    //自动轮播
    timer = setInterval(autoPlay,4000);

    // ========== 猫咪投票排名 ==========
    let catData = [
        {id:1,name:"大橘",desc:"性格温顺，爱晒太阳",vote:128},
        {id:2,name:"狸花猫",desc:"机灵警惕，身手灵活",vote:96},
        {id:3,name:"三花",desc:"胆小温柔，十分亲人",vote:156},
        {id:4,name:"小黑",desc:"高冷帅气，夜间出没",vote:88}
    ];
    function renderCat(){
        let html="";
        catData.forEach(item=>{
            html+=`
            <div class="cat-card">
                <img src="https://picsum.photos/300/200?random=${item.id}">
                <div class="cat-info">
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <p class="vote-num">喜爱票数：${item.vote}</p>
                    <button class="vote-btn" onclick="addVote(${item.id})">投我一票</button>
                </div>
            </div>
            `
        })
        document.getElementById("catContainer").innerHTML=html;
        renderRank();
    }
    function addVote(id){
        let cat = catData.find(v=>v.id===id);
        if(cat){
            cat.vote++;
            renderCat();
            alert("投票成功！");
        }
    }
    function renderRank(){
        let sortArr = [...catData].sort((a,b)=>b.vote-a.vote);
        let html="";
        sortArr.forEach((item,idx)=>{
            html+=`<div class="rank-item"><span>第${idx+1}名 ${item.name}</span><span>票数：${item.vote}</span></div>`
        })
        document.getElementById("rankBox").innerHTML=html;
    }

    // ========== 图片上传预览 ==========
    document.getElementById("file-input").addEventListener("change",function(e){
        let file = e.target.files[0];
        if(!file)return;
        let reader = new FileReader();
        reader.onload=function(res){
            let img = document.getElementById("imgPreview");
            img.src = res.target.result;
            img.style.display="block";
        }
        reader.readAsDataURL(file);
    })

    // ========== 智能问答 ==========
    const aiKnow = {
        "喂食":"喂猫粮和清水，别喂重油重盐饭菜",
        "生病":"及时隔离，联系救助人员送医",
        "抚摸":"不熟不要伸手，容易被抓伤",
        "过冬":"搭建避风窝，放置保暖衣物"
    };
    function sendChat(){
        let val = document.getElementById("chatInput").value.trim();
        if(!val)return;
        let box = document.getElementById("chatBox");
        box.innerHTML += `<div class="user-msg">我：${val}</div>`;
        let ans = "暂时没有相关解答哦";
        for(let k in aiKnow){
            if(val.includes(k)){ans=aiKnow[k];break;}
        }
        setTimeout(()=>{
            box.innerHTML += `<div class="ai-msg">AI助手：${ans}</div>`;
            box.scrollTop = box.scrollHeight;
        },400)
        document.getElementById("chatInput").value="";
    }

    window.onload=renderCat;
</script>
</body>
</html>
