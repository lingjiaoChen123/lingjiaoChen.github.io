<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意互动区</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f6f7f9;}
        .nav{background:#232730;padding:16px 0;}
        .nav-box{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:45px;}
        .nav a{color:#fff;text-decoration:none;font-size:17px;}
        .nav a.active{color:#ff9500;}
        .container{max-width:1200px;margin:40px auto;padding:0 20px;}
        h2{text-align:center;font-size:28px;margin-bottom:30px;}
        .vote-box{background:#fff;padding:25px;border-radius:12px;box-shadow:0 3px 12px #eee;margin-bottom:40px;}
        .vote-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee;align-items:center;}
        .vote-btn{background:#ff7875;color:#fff;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;}
        .rank-title{margin:50px 0 20px;}
        /* 图片上传 */
        .upload-area{background:#fff;padding:25px;border-radius:12px;margin:30px 0;}
        #upFile{display:none;}
        .up-btn{background:#409eff;color:#fff;padding:8px 18px;border-radius:6px;cursor:pointer;display:inline-block;}
        .preview{max-width:300px;margin-top:15px;}
        /* 评论区 */
        .comment-box{background:#fff;padding:25px;border-radius:12px;}
        .com-input{width:80%;padding:10px;border:1px solid #ccc;border-radius:6px;}
        .com-btn{padding:10px 15px;background:#95de64;color:#fff;border:none;border-radius:6px;}
        .com-list{margin-top:20px;}
        .com-item{padding:10px;border-bottom:1px solid #eee;}
        footer{background:#232730;color:#fff;text-align:center;padding:35px 0;margin-top:60px;}
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-box">
            <a href="index.html">首页</a>
            <a href="archive.html">猫咪档案库</a>
            <a href="interaction.html" class="active">创意互动区</a>
            <a href="ai.html">智能助手区</a>
            <a href="login.html">退出登录</a>
        </div>
    </div>

    <div class="container">
        <h2>猫咪喜爱度投票 · 选出人气萌猫</h2>
        <div class="vote-box" id="voteBox"></div>

        <h2 class="rank-title">实时人气排名</h2>
        <div class="vote-box" id="rankBox"></div>

        <h2>上传猫咪实拍/手绘作品</h2>
        <div class="upload-area">
            <label class="up-btn" for="upFile">选择图片上传</label>
            <input type="file" id="upFile" accept="image/*">
            <div><img class="preview" id="preImg" style="display:none;"></div>
            <p style="margin-top:10px;color:#666;">可上传实拍照片、手绘猫咪画作</p>
        </div>

        <h2>猫咪话题评论互动</h2>
        <div class="comment-box">
            <input class="com-input" id="comText" placeholder="发表你对校园猫咪的看法与心得">
            <button class="com-btn" onclick="sendComment()">发表评论</button>
            <div class="com-list" id="comList"></div>
        </div>
    </div>

    <footer>
        <p>爱心守护团队联系电话：13800138000</p>
        <p>官方反馈邮箱：catlove@school.com</p>
    </footer>

<script>
// 投票数据
let voteData=[
    {id:1,name:"大橘",vote:132},
    {id:2,name:"狸花猫",vote:98},
    {id:3,name:"三花",vote:165},
    {id:4,name:"小黑",vote:86}
];

function renderVote(){
    let h="";
    voteData.forEach(item=>{
        h+=`
        <div class="vote-item">
            <span>${item.name} 当前票数：${item.vote}</span>
            <button class="vote-btn" onclick="addVote(${item.id})">投一票</button>
        </div>
        `
    })
    document.getElementById("voteBox").innerHTML=h;
    renderRank();
}
function addVote(id){
    let obj=voteData.find(v=>v.id===id);
    obj.vote++;
    renderVote();
}
function renderRank(){
    let sort=[...voteData].sort((a,b)=>b.vote-a.vote);
    let h="";
    sort.forEach((item,idx)=>{
        h+=`<div class="vote-item"><span>第${idx+1}名 ${item.name}</span><span>总票数：${item.vote}</span></div>`
    })
    document.getElementById("rankBox").innerHTML=h;
}

// 图片上传预览
document.getElementById("upFile").addEventListener("change",e=>{
    let file=e.target.files[0];
    if(!file)return;
    let reader=new FileReader();
    reader.onload=res=>{
        let img=document.getElementById("preImg");
        img.src=res.target.result;
        img.style.display="block";
    }
    reader.readAsDataURL(file);
})

// 评论
function sendComment(){
    let text=document.getElementById("comText").value.trim();
    if(!text)return;
    let comList=JSON.parse(localStorage.getItem("catComment"))||[];
    comList.push({user:localStorage.getItem("nowUser"),content:text,time:new Date().toLocaleString()});
    localStorage.setItem("catComment",JSON.stringify(comList));
    showComment();
    document.getElementById("comText").value="";
}
function showComment(){
    let list=JSON.parse(localStorage.getItem("catComment"))||[];
    let h="";
    list.forEach(item=>{
        h+=`<div class="com-item"><p>${item.user}：${item.content}</p><p style="font-size:12px;color:#999;">${item.time}</p></div>`
    })
    document.getElementById("comList").innerHTML=h;
}

renderVote();
showComment();
</script>
</body>
</html>
