        .container{max-width:900px;margin:60px auto;padding:0 20px;}
        h2{text-align:center;font-size:30px;margin-bottom:40px;}
        .box{background:#fff;padding:25px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px #eee;}

<body>
    <div class="nav">
        <h2>校园流浪猫守护站</h2>
        <div>
            <a href="index.html">首页</a>

            <a href="about.html" class="active">参与方式</a>
        </div>
    </div>
    <div class="container">
        <h2>如何一起守护流浪猫</h2>
        <div class="box">
            <h3>1. 文明投喂</h3>
            <p>准备猫粮与干净饮用水，不要投喂人类零食、辛辣油腻食物，投喂后清理现场垃圾。</p>
        </div>
        <div class="box">
            <h3>2. 搭建避风小窝</h3>
            <p>秋冬季节利用纸箱、旧衣物搭建简易猫窝，帮助猫咪抵御寒风低温。</p>
        </div>
        <div class="box">
            <h3>3. 拒绝伤害善待生灵</h3>
            <p>不驱赶、不殴打流浪猫咪，遇见受伤猫咪及时上报救助。</p>
        </div>
        <div class="box">
            <h3>4. 宣传爱心理念</h3>
            <p>带动身边同学一起关爱小动物，营造温暖友善的校园氛围。</p>
        </div>
    </div>
    <footer>用小小的善意，温暖校园流浪生灵</footer>
