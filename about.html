    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f7f8fa;color:#333;}
        /* 导航 */
        .nav{background:#222;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99;}
        .nav a{color:#fff;text-decoration:none;margin:0 15px;}
        .nav a:hover,.nav a.active{color:#ffb700;}
        /* 容器 */
        .container{max-width:1200px;margin:40px auto;padding:0 20px;}
        .title{text-align:center;font-size:30px;margin:50px 0 30px;color:#222;}
        /* 参与方式卡片 */
        .join-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
        .join-item{background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 10px #eee;}
        .join-item h3{color:#2c3e50;margin-bottom:10px;}
        footer{text-align:center;padding:30px;background:#222;color:#fff;margin-top:60px;}
    </style>

<body>
    <!-- 导航栏 -->
    <div class="nav">
        <h2>校园流浪猫守护站</h2>
        <div>
            <a href="index.html">首页</a>
            <a href="cats.html">猫咪档案</a>
            <a href="about.html" class="active">参与方式</a>
        </div>
    </div>

    <div class="container">
        <h2 class="title">如何参与守护行动</h2>
        <ul class="join-list">
            <li class="join-item">
                <h3>文明投喂</h3>
                <p>选择低盐猫粮和干净的水，定点投喂并清理残渣，避免投喂高盐高油的人类食物。</p>
            </li>
            <li class="join-item">
                <h3>绝育TNR</h3>
                <p>通过“捕捉-绝育-放归”控制流浪猫数量，减少繁殖压力，降低猫咪健康风险。</p>
            </li>
            <li class="join-item">
                <h3>领养代替购买</h3>
                <p>遇到亲人的猫咪，可以帮助联系领养，给它们一个温暖的家，减少流浪。</p>
            </li>
            <li class="join-item">
                <h3>拒绝伤害</h3>
                <p>不驱赶、不虐待，遇到生病受伤的猫咪，可联系学校后勤或救助组织。</p>
            </li>
        </ul>
    </div>

    <footer>
        校园流浪猫守护平台 · 用心守护每一只小生命
